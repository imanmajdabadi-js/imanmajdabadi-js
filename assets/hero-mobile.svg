    <text x="24" y="267" fill="#91a4a3" class="sans" font-size="18">I like turning messy requirements into</text>
    <text x="24" y="294" fill="#91a4a3" class="sans" font-size="18">interfaces that feel clear and useful.</text>
  </g>

  <g class="mono" font-size="12" letter-spacing="1.5">
