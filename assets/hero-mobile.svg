<svg width="720" height="840" viewBox="0 0 720 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Iman Majdabadi Farahani — Frontend Developer</title>
  <desc id="desc">Mobile casebook-inspired profile header for a frontend developer focused on clear product interfaces.</desc>
  <style>
    .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#14282c" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>

  <rect width="720" height="840" rx="28" fill="#081416"/>
  <rect x="20" y="20" width="680" height="800" rx="20" fill="#0d1d20"/>
  <rect x="20" y="20" width="680" height="800" rx="20" fill="url(#grid)" opacity=".48"/>
  <path d="M20 84H700M20 372H700M20 750H700" stroke="#294348"/>

  <g class="mono" font-size="13" letter-spacing="2.4">
    <text x="48" y="55" fill="#ffb000">FIELD NOTES / 001</text>
    <text x="603" y="55" fill="#55c4b2">TEHRAN</text>
  </g>

  <g>
    <circle cx="360" cy="226" r="111" stroke="#294348" stroke-width="1.5" stroke-dasharray="7 9"/>
