    <text y="77" fill="#f3ebdc" class="sans" font-size="52" font-weight="760" letter-spacing="-2">Hi, I'm Iman.</text>
    <text y="133" fill="#f3ebdc" class="sans" font-size="52" font-weight="760" letter-spacing="-2">I build interfaces</text>
    <text y="189" fill="#f3ebdc" class="sans" font-size="52" font-weight="760" letter-spacing="-2">for real workflows.</text>
