<svg width="1200" height="250" viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Advanced Sticky Note</title>
  <desc id="desc">An interactive note workspace with multiple sheets, drag, resize, and local persistence.</desc>
  <style>
    .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
  <rect width="1200" height="250" rx="22" fill="#081416"/>
  <rect x="20" y="20" width="1160" height="210" rx="16" fill="#0d1d20" stroke="#294348"/>
  <path d="M142 20V230M856 20V230" stroke="#294348"/>
  <text x="54" y="142" fill="#f3ebdc" class="mono" font-size="64" font-weight="700">02</text>
  <text x="176" y="58" fill="#55c4b2" class="mono" font-size="12" letter-spacing="2.5">PROJECT NOTE / INTERACTION</text>
  <text x="176" y="105" fill="#f3ebdc" class="sans" font-size="38" font-weight="720" letter-spacing="-1">ADVANCED STICKY NOTE</text>
  <text x="176" y="143" fill="#91a4a3" class="sans" font-size="16">A note workspace I built to explore drag, resize, multiple sheets,</text>
  <text x="176" y="169" fill="#91a4a3" class="sans" font-size="16">and saving everything locally.</text>
  <text x="176" y="207" fill="#ffb000" class="mono" font-size="11" letter-spacing="1.7">REACT  ·  TYPESCRIPT  ·  TAILWIND  ·  LOCAL STORAGE</text>
