  <text x="48" y="81" fill="#f3ebdc" class="mono" font-size="48" font-weight="700">02</text>
  <text x="150" y="59" fill="#55c4b2" class="mono" font-size="11" letter-spacing="2.2">PROJECT NOTE</text>
  <text x="150" y="83" fill="#91a4a3" class="mono" font-size="11" letter-spacing="2.2">INTERACTION / LOCAL-FIRST</text>
  <text x="48" y="169" fill="#f3ebdc" class="sans" font-size="38" font-weight="760" letter-spacing="-1">ADVANCED STICKY NOTE</text>
  <text x="48" y="207" fill="#91a4a3" class="sans" font-size="16">A note workspace I built to explore drag,</text>
  <text x="48" y="232" fill="#91a4a3" class="sans" font-size="16">resize, multiple sheets, and saving</text>
  <text x="48" y="257" fill="#91a4a3" class="sans" font-size="16">everything locally.</text>
  <text x="48" y="290" fill="#ffb000" class="mono" font-size="10" letter-spacing="1.4">REACT · TYPESCRIPT · TAILWIND · LOCAL STORAGE</text>
