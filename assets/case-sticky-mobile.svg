<svg width="720" height="430" viewBox="0 0 720 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Advanced Sticky Note</title>
  <desc id="desc">An interactive note workspace with multiple sheets, drag, resize, and local persistence.</desc>
  <style>.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}.sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}</style>
  <rect width="720" height="430" rx="28" fill="#081416"/>
  <rect x="20" y="20" width="680" height="390" rx="20" fill="#0d1d20" stroke="#294348"/>
