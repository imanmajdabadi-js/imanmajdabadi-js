<svg width="720" height="430" viewBox="0 0 720 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Peygirino Client Dashboard</title>
  <desc id="desc">A React and TypeScript dashboard for lead management, filters, validation, and activity tracking.</desc>
  <style>.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}.sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}</style>
  <rect width="720" height="430" rx="28" fill="#081416"/>
  <rect x="20" y="20" width="680" height="390" rx="20" fill="#0d1d20" stroke="#294348"/>
  <path d="M20 112H700M20 312H700" stroke="#294348"/>
  <text x="48" y="81" fill="#f3ebdc" class="mono" font-size="48" font-weight="700">01</text>
  <text x="150" y="59" fill="#ffb000" class="mono" font-size="11" letter-spacing="2.2">PROJECT NOTE</text>
  <text x="150" y="83" fill="#91a4a3" class="mono" font-size="11" letter-spacing="2.2">PERSIAN RTL DASHBOARD</text>
  <text x="48" y="169" fill="#f3ebdc" class="sans" font-size="38" font-weight="760" letter-spacing="-1">PEYGIRINO</text>
  <text x="48" y="207" fill="#91a4a3" class="sans" font-size="16">A Persian RTL dashboard for tracking leads</text>
  <text x="48" y="232" fill="#91a4a3" class="sans" font-size="16">and follow-ups. I focused on forms, filters,</text>
  <text x="48" y="257" fill="#91a4a3" class="sans" font-size="16">validation, and keeping the workflow easy to scan.</text>
  <text x="48" y="290" fill="#55c4b2" class="mono" font-size="10" letter-spacing="1.4">REACT · TYPESCRIPT · ZUSTAND · TAILWIND</text>
  <g transform="translate(48 350)">
